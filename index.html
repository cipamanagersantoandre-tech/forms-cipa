<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Forms CIPA - Criador de Formulários</title>
<style>
:root {
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --primary-light: #e0e7ff;
  --bg: #f8fafc;
  --bg-elev: #ffffff;
  --bg-elev-2: #f1f5f9;
  --text: #0f172a;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --success: #10b981;
  --error: #ef4444;
  --warning: #f59e0b;
  --radius: 12px;
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f172a;
    --bg-elev: #1e293b;
    --bg-elev-2: #334155;
    --text: #f1f5f9;
    --text-muted: #cbd5e1;
    --border: #334155;
    --primary: #6366f1;
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

.container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

.header {
  background: #0a3d2e;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  flex-wrap: wrap;
  gap: 16px;
}

.logo {
  font-size: 20px;
  font-weight: 800;
  color: white;
  cursor: pointer;
}

.nav { display: flex; gap: 8px; flex-wrap: wrap; }

.btn {
  border: none;
  background: var(--bg-elev-2);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid var(--border);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: inherit;
}
.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); border-color: var(--primary); }
.btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-hover); }
.btn-sm { padding: 6px 12px; font-size: 13px; white-space: nowrap; }
.btn-danger { background: var(--error); color: white; border-color: var(--error); }

.header .btn { background: rgba(255,255,255,0.1); color: white; border-color: rgba(255,255,255,0.2); }
.header .btn:hover { background: rgba(255,255,255,0.2); border-color: white; }

.card {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all 0.2s;
}

.forms-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
  margin-top: 24px;
}

.form-card { cursor: pointer; transition: all 0.2s; }
.form-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--primary); }

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal.active { display: flex; }
.modal-content {
  background: var(--bg-elev);
  border-radius: 20px;
  padding: 32px;
  max-width: 500px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
}

.form-group { margin-bottom: 20px; }
.label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
.input, .textarea, .select {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  transition: all 0.2s;
}
.input:focus, .textarea:focus, .select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
}

.hidden { display: none !important; }

.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; }
.toast {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow-lg);
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.progress-container {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    background: var(--bg-elev);
    border-radius: 12px;
    padding: 16px;
    box-shadow: var(--shadow-lg);
    z-index: 2000;
    border: 1px solid var(--border);
    transform: translateY(100%);
    transition: transform 0.3s ease;
}
.progress-container.visible { transform: translateY(0); }
.progress-bar-bg {
    background: var(--bg-elev-2);
    border-radius: 20px;
    height: 8px;
    overflow: hidden;
}
.progress-bar-fill {
    background: linear-gradient(90deg, var(--primary), #8b5cf6);
    width: 0%;
    height: 100%;
    border-radius: 20px;
    transition: width 0.3s ease;
}
</style>
</head>
<body>

<div class="header">
  <div class="container">
    <div class="header-inner">
      <div class="logo" onclick="goToHome()">📋 Forms CIPA</div>
      <nav class="nav">
        <button class="btn btn-sm" onclick="goToHome()">🏠 Início</button>
        <button class="btn btn-sm btn-primary" onclick="openNewFormModal()">➕ Novo</button>
        <button class="btn btn-sm" onclick="sincronizarTudoParaNuvem()">☁️ Enviar Tudo</button>
        <button class="btn btn-sm btn-primary" onclick="buscarTudoDaNuvem()">📥 Buscar Tudo</button>
      </nav>
    </div>
  </div>
</div>

<main class="main">
  <div class="container">
    <div id="view-home" class="view">
      <div style="text-align: center; padding: 48px 0;">
        <h1 style="font-size: 32px; margin-bottom: 16px;">Seus formulários</h1>
        <p style="color: var(--text-muted); max-width: 500px; margin: 0 auto 24px;">Crie formulários com perguntas condicionadas, gráficos e muito mais.</p>
        <button class="btn btn-primary" onclick="openNewFormModal()">➕ Criar novo</button>
      </div>
      <div id="forms-list"></div>
    </div>

    <div id="view-editor" class="view hidden">
      <div style="margin-bottom: 20px;">
        <button class="btn" onclick="goToHome()">← Voltar</button>
        <span id="current-form-name" style="margin-left: 16px; font-weight: 600;"></span>
      </div>
      <div class="card">
        <div class="form-group">
          <label class="label">✏️ Nome do formulário</label>
          <input type="text" class="input" id="form-name-input" oninput="updateFormName()">
        </div>
        <div class="form-group">
          <label class="label">📝 Descrição</label>
          <textarea class="textarea" id="form-description" rows="3" oninput="updateFormMeta()"></textarea>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0 16px;">
          <h3>Perguntas</h3>
          <button class="btn btn-primary btn-sm" onclick="addQuestion()">➕ Nova</button>
        </div>
        <div id="questions-list"></div>
        <div id="empty-questions" class="empty-state hidden">
          <p>📭 Nenhuma pergunta ainda. Clique em "Nova pergunta" para começar.</p>
        </div>
      </div>
      <div style="margin-top: 20px; display: flex; gap: 12px; justify-content: flex-end;">
        <button class="btn btn-primary" onclick="salvarFormularioLocalNaNuvem()">☁️ Salvar na Nuvem</button>
      </div>
    </div>

    <div id="view-response" class="view hidden">
      <div style="margin-bottom: 20px;">
        <button class="btn" onclick="goToHome()">← Voltar</button>
        <span id="response-form-name" style="margin-left: 16px; font-weight: 600;"></span>
      </div>
      <div class="card">
        <h3>📝 Responder Formulário</h3>
        <div id="response-questions"></div>
        <button class="btn btn-primary" onclick="submitResponse()" style="width: 100%; margin-top: 20px;">📤 Enviar Resposta</button>
      </div>
    </div>

    <div id="view-responses-list" class="view hidden">
      <div style="margin-bottom: 20px;">
        <button class="btn" onclick="goToHome()">← Voltar</button>
        <span id="responses-list-name" style="margin-left: 16px; font-weight: 600;"></span>
      </div>
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h3>📊 Respostas Recebidas</h3>
          <button class="btn btn-sm btn-danger" onclick="clearAllResponses()">🗑️ Limpar Todas</button>
        </div>
        <div id="responses-list-container"></div>
      </div>
    </div>
  </div>
</main>

<div id="new-form-modal" class="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:16px;">✨ Criar novo formulário</h3>
    <div class="form-group">
      <label class="label">Nome</label>
      <input type="text" class="input" id="new-form-name" placeholder="Ex: Pesquisa de Satisfação" autofocus>
    </div>
    <div style="display:flex;gap:12px;justify-content:flex-end;">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="createNewForm()">Criar</button>
    </div>
  </div>
</div>

<div id="question-modal" class="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="question-modal-title" style="margin-bottom:16px;">✏️ Editar Pergunta</h3>
    <div class="form-group">
      <label class="label">Texto da pergunta</label>
      <input type="text" class="input" id="question-text" placeholder="Digite sua pergunta">
    </div>
    <div class="form-group">
      <label class="label">Tipo</label>
      <select class="select" id="question-type" onchange="toggleOptionsField()">
        <option value="text">Texto curto</option>
        <option value="textarea">Texto longo</option>
        <option value="email">E-mail</option>
        <option value="number">Número</option>
        <option value="radio">Múltipla escolha (única)</option>
        <option value="checkbox">Múltipla escolha (várias)</option>
        <option value="select">Menu suspenso</option>
        <option value="scale">Escala 1-5</option>
      </select>
    </div>
    <div id="options-container" class="form-group" style="display: none;">
      <label class="label">Opções (uma por linha)</label>
      <textarea class="textarea" id="question-options" rows="4" placeholder="Opção 1&#10;Opção 2&#10;Opção 3"></textarea>
    </div>
    <div class="form-group">
      <label class="checkbox-option">
        <input type="checkbox" id="question-required"> Obrigatória
      </label>
    </div>
    <div style="display:flex;gap:12px;justify-content:flex-end;">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" id="delete-question-btn" style="display: none;" onclick="deleteCurrentQuestion()">Excluir</button>
      <button class="btn btn-primary" onclick="saveCurrentQuestion()">Salvar</button>
    </div>
  </div>
</div>

<div id="confirm-modal" class="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="confirm-title" style="margin-bottom:16px;">Confirmar</h3>
    <p id="confirm-message" style="margin-bottom:24px;"></p>
    <div style="display:flex;gap:12px;justify-content:flex-end;">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" id="confirm-btn">Confirmar</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<div id="progress-container" class="progress-container">
    <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-bar-fill"></div>
    </div>
</div>

<script>
// ==================== CONFIGURAÇÃO ====================
const STORAGE_KEY = 'forms_cipa_v2';
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxzwBE7LtK5qH-bMdIpQxRG4J3-Rjy_vCtqpUKky2UmYqVWpmd3Dk3_22RGTugtt0FqEA/exec';

let forms = [];
let currentForm = null;
let currentQuestionId = null;
let confirmCallback = null;

// ==================== FUNÇÕES AUXILIARES ====================
function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 8);
}

function saveToLocal() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(forms));
}

function loadFromLocal() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            forms = JSON.parse(saved);
        } catch(e) { forms = []; }
    }
    if (forms.length === 0) {
        // Formulário de exemplo
        forms.push({
            id: generateId(),
            name: "Pesquisa de Satisfação",
            description: "Conte-nos sua experiência",
            createdAt: new Date().toISOString(),
            questions: [
                { id: generateId(), text: "Qual seu nome?", type: "text", required: true, options: [] },
                { id: generateId(), text: "Como avalia nosso serviço?", type: "scale", required: true, options: [] },
                { id: generateId(), text: "O que podemos melhorar?", type: "textarea", required: false, options: [] }
            ],
            responses: []
        });
        saveToLocal();
    }
}

function showToast(msg, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span><span>${msg}</span>`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function closeModal(e) {
    if (!e || e.target.classList.contains('modal')) {
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
    }
    currentQuestionId = null;
    confirmCallback = null;
}

function confirmAction(title, message, onConfirm) {
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-message').textContent = message;
    confirmCallback = onConfirm;
    const btn = document.getElementById('confirm-btn');
    const newBtn = btn.cloneNode(true);
    btn.parentNode.replaceChild(newBtn, btn);
    newBtn.onclick = () => { 
        if (confirmCallback) confirmCallback();
        closeModal();
        confirmCallback = null;
    };
    document.getElementById('confirm-modal').classList.add('active');
}

function showProgress(show) {
    const container = document.getElementById('progress-container');
    if (show) {
        container.classList.add('visible');
    } else {
        container.classList.remove('visible');
    }
}

function updateProgress(percent) {
    document.getElementById('progress-bar-fill').style.width = `${percent}%`;
}

function goToHome() {
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
    document.getElementById('view-home').classList.remove('hidden');
    currentForm = null;
    renderFormsList();
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ==================== COMUNICAÇÃO COM A NUVEM ====================
async function salvarFormularioNaNuvem(form) {
    const dados = {
        action: 'saveForm',
        formId: form.id,
        formName: form.name,
        formDescription: form.description || '',
        questions: form.questions,
        createdAt: form.createdAt
    };
    
    try {
        const resposta = await fetch(SHEETS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });
        const resultado = await resposta.json();
        return resultado.success === true;
    } catch (erro) {
        console.error('Erro ao salvar:', erro);
        return false;
    }
}

async function salvarRespostaNaNuvem(formId, resposta) {
    const dados = {
        action: 'saveResponse',
        formId: formId,
        responseId: resposta.id,
        responseData: resposta.data,
        timestamp: resposta.timestamp
    };
    
    try {
        await fetch(SHEETS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });
        return true;
    } catch (erro) {
        console.error('Erro ao salvar resposta:', erro);
        return false;
    }
}

async function buscarFormulariosDaNuvem() {
    const dados = { action: 'getAllForms' };
    
    try {
        const resposta = await fetch(SHEETS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });
        const resultado = await resposta.json();
        return resultado.success ? resultado.forms : [];
    } catch (erro) {
        console.error('Erro ao buscar:', erro);
        return [];
    }
}

async function buscarRespostasDaNuvem(formId) {
    const dados = { action: 'getResponses', formId: formId };
    
    try {
        const resposta = await fetch(SHEETS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });
        const resultado = await resposta.json();
        return resultado.success ? resultado.responses : [];
    } catch (erro) {
        console.error('Erro ao buscar respostas:', erro);
        return [];
    }
}

async function sincronizarTudoParaNuvem() {
    if (forms.length === 0) {
        showToast('Nenhum formulário para enviar', 'error');
        return;
    }
    
    showProgress(true);
    updateProgress(0);
    
    let enviados = 0;
    for (let i = 0; i < forms.length; i++) {
        const sucesso = await salvarFormularioNaNuvem(forms[i]);
        if (sucesso) enviados++;
        updateProgress(((i + 1) / forms.length) * 100);
        await new Promise(r => setTimeout(r, 100));
    }
    
    showProgress(false);
    showToast(`${enviados} de ${forms.length} formulários enviados!`, enviados > 0 ? 'success' : 'error');
}

async function buscarTudoDaNuvem() {
    showProgress(true);
    updateProgress(30);
    
    const formsCloud = await buscarFormulariosDaNuvem();
    
    if (formsCloud.length > 0) {
        updateProgress(70);
        
        for (const formCloud of formsCloud) {
            const exists = forms.find(f => f.id === formCloud.id);
            
            if (!exists) {
                // Formulário novo - busca respostas
                const responses = await buscarRespostasDaNuvem(formCloud.id);
                forms.push({
                    id: formCloud.id,
                    name: formCloud.name,
                    description: formCloud.description || '',
                    createdAt: formCloud.createdAt || new Date().toISOString(),
                    questions: formCloud.questions || [],
                    responses: responses || []
                });
            } else {
                // Atualiza perguntas se vier da nuvem (mais recente)
                if (formCloud.questions && formCloud.questions.length > 0) {
                    exists.questions = formCloud.questions;
                    exists.description = formCloud.description || '';
                }
                // Busca respostas novas
                const responses = await buscarRespostasDaNuvem(formCloud.id);
                const existingIds = new Set(exists.responses.map(r => r.id));
                for (const resp of responses) {
                    if (!existingIds.has(resp.id)) {
                        exists.responses.push(resp);
                    }
                }
            }
        }
        
        saveToLocal();
        updateProgress(100);
        setTimeout(() => showProgress(false), 500);
        renderFormsList();
        showToast(`${formsCloud.length} formulários sincronizados!`, 'success');
    } else {
        showProgress(false);
        showToast('Nenhum formulário encontrado na nuvem', 'info');
    }
}

async function salvarFormularioLocalNaNuvem() {
    if (!currentForm) {
        showToast('Nenhum formulário aberto', 'error');
        return;
    }
    
    showProgress(true);
    updateProgress(50);
    
    const sucesso = await salvarFormularioNaNuvem(currentForm);
    
    updateProgress(100);
    setTimeout(() => showProgress(false), 500);
    
    if (sucesso) {
        showToast(`"${currentForm.name}" salvo na nuvem!`, 'success');
    } else {
        showToast('Erro ao salvar na nuvem', 'error');
    }
}

// ==================== GERENCIAMENTO DE FORMULÁRIOS ====================
function renderFormsList() {
    const container = document.getElementById('forms-list');
    if (!container) return;
    
    if (forms.length === 0) {
        container.innerHTML = `<div class="empty-state card"><p>📭 Nenhum formulário</p><button class="btn btn-primary" onclick="openNewFormModal()">Criar primeiro</button></div>`;
        return;
    }
    
    container.innerHTML = `<div class="forms-grid">${forms.map(form => `
        <div class="card form-card">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                <div onclick="openFormEditor('${form.id}')" style="flex:1;">
                    <h3 style="margin-bottom:8px;">${escapeHtml(form.name)}</h3>
                    <p style="color:var(--text-muted);font-size:13px;">${form.description || 'Sem descrição'}</p>
                    <div style="margin-top:12px;font-size:12px;color:var(--text-muted);">
                        📝 ${form.questions.length} perguntas | 📊 ${form.responses.length} respostas
                    </div>
                </div>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-sm" onclick="event.stopPropagation(); openResponseForm('${form.id}')" title="Responder">📝</button>
                    <button class="btn btn-sm" onclick="event.stopPropagation(); viewResponses('${form.id}')" title="Ver respostas">📊</button>
                    <button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); deleteForm('${form.id}')" title="Excluir">🗑️</button>
                </div>
            </div>
        </div>
    `).join('')}</div>`;
}

function openFormEditor(formId) {
    const form = forms.find(f => f.id === formId);
    if (!form) return;
    
    currentForm = form;
    
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
    document.getElementById('view-editor').classList.remove('hidden');
    document.getElementById('current-form-name').textContent = form.name;
    document.getElementById('form-name-input').value = form.name;
    document.getElementById('form-description').value = form.description || '';
    
    renderQuestionsList();
}

function renderQuestionsList() {
    const container = document.getElementById('questions-list');
    const empty = document.getElementById('empty-questions');
    
    if (!currentForm || currentForm.questions.length === 0) {
        container.innerHTML = '';
        empty.classList.remove('hidden');
        return;
    }
    
    empty.classList.add('hidden');
    
    container.innerHTML = currentForm.questions.map((q, idx) => `
        <div class="card" style="margin-bottom: 12px;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px;">
                <div style="flex:1;">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap;">
                        <span style="background: var(--primary-light); padding: 2px 8px; border-radius: 20px; font-size: 11px;">#${idx+1}</span>
                        <span style="background: var(--bg-elev-2); padding: 2px 8px; border-radius: 20px; font-size: 11px;">${getTypeName(q.type)}</span>
                        ${q.required ? '<span style="color: var(--error); font-size: 11px;">* Obrigatória</span>' : ''}
                    </div>
                    <div style="font-weight: 500;">${escapeHtml(q.text)}</div>
                    ${q.options && q.options.length > 0 ? `<div style="font-size: 12px; color: var(--text-muted); margin-top: 8px;">Opções: ${q.options.join(', ')}</div>` : ''}
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-sm" onclick="editQuestion('${q.id}')">✏️</button>
                    <button class="btn btn-sm" onclick="moveQuestionUp('${q.id}')" ${idx === 0 ? 'disabled style="opacity:0.5;"' : ''}>↑</button>
                    <button class="btn btn-sm" onclick="moveQuestionDown('${q.id}')" ${idx === currentForm.questions.length-1 ? 'disabled style="opacity:0.5;"' : ''}>↓</button>
                </div>
            </div>
        </div>
    `).join('');
}

function getTypeName(type) {
    const types = {
        text: 'Texto curto',
        textarea: 'Texto longo',
        email: 'E-mail',
        number: 'Número',
        radio: 'Múltipla escolha',
        checkbox: 'Múltipla (várias)',
        select: 'Menu',
        scale: 'Escala 1-5'
    };
    return types[type] || type;
}

function updateFormName() {
    if (currentForm) {
        currentForm.name = document.getElementById('form-name-input').value;
        document.getElementById('current-form-name').textContent = currentForm.name;
        saveToLocal();
    }
}

function updateFormMeta() {
    if (currentForm) {
        currentForm.description = document.getElementById('form-description').value;
        saveToLocal();
    }
}

function addQuestion() {
    currentQuestionId = null;
    document.getElementById('question-modal-title').textContent = '➕ Nova Pergunta';
    document.getElementById('question-text').value = '';
    document.getElementById('question-type').value = 'text';
    document.getElementById('question-required').checked = false;
    document.getElementById('question-options').value = '';
    document.getElementById('delete-question-btn').style.display = 'none';
    toggleOptionsField();
    document.getElementById('question-modal').classList.add('active');
}

function editQuestion(questionId) {
    const q = currentForm.questions.find(q => q.id === questionId);
    if (!q) return;
    
    currentQuestionId = questionId;
    document.getElementById('question-modal-title').textContent = '✏️ Editar Pergunta';
    document.getElementById('question-text').value = q.text;
    document.getElementById('question-type').value = q.type;
    document.getElementById('question-required').checked = q.required;
    document.getElementById('question-options').value = q.options ? q.options.join('\n') : '';
    document.getElementById('delete-question-btn').style.display = 'inline-flex';
    toggleOptionsField();
    document.getElementById('question-modal').classList.add('active');
}

function toggleOptionsField() {
    const type = document.getElementById('question-type').value;
    const needsOptions = ['radio', 'checkbox', 'select'].includes(type);
    document.getElementById('options-container').style.display = needsOptions ? 'block' : 'none';
}

function saveCurrentQuestion() {
    const text = document.getElementById('question-text').value.trim();
    if (!text) {
        showToast('Digite o texto da pergunta', 'error');
        return;
    }
    
    const type = document.getElementById('question-type').value;
    const required = document.getElementById('question-required').checked;
    let options = [];
    
    if (['radio', 'checkbox', 'select'].includes(type)) {
        options = document.getElementById('question-options').value.split('\n').filter(opt => opt.trim());
        if (options.length === 0) {
            showToast('Adicione pelo menos uma opção', 'error');
            return;
        }
    }
    
    if (currentQuestionId) {
        // Editar existente
        const idx = currentForm.questions.findIndex(q => q.id === currentQuestionId);
        if (idx !== -1) {
            currentForm.questions[idx] = {
                ...currentForm.questions[idx],
                text, type, required, options
            };
        }
    } else {
        // Nova pergunta
        currentForm.questions.push({
            id: generateId(),
            text, type, required, options
        });
    }
    
    saveToLocal();
    renderQuestionsList();
    closeModal();
    showToast('Pergunta salva!', 'success');
}

function deleteCurrentQuestion() {
    if (currentQuestionId) {
        closeModal();
        confirmAction('Excluir Pergunta', 'Tem certeza que deseja excluir esta pergunta?', () => {
            currentForm.questions = currentForm.questions.filter(q => q.id !== currentQuestionId);
            saveToLocal();
            renderQuestionsList();
            showToast('Pergunta excluída', 'success');
            currentQuestionId = null;
        });
    }
}

function moveQuestionUp(questionId) {
    const idx = currentForm.questions.findIndex(q => q.id === questionId);
    if (idx > 0) {
        [currentForm.questions[idx-1], currentForm.questions[idx]] = [currentForm.questions[idx], currentForm.questions[idx-1]];
        saveToLocal();
        renderQuestionsList();
    }
}

function moveQuestionDown(questionId) {
    const idx = currentForm.questions.findIndex(q => q.id === questionId);
    if (idx < currentForm.questions.length - 1) {
        [currentForm.questions[idx+1], currentForm.questions[idx]] = [currentForm.questions[idx], currentForm.questions[idx+1]];
        saveToLocal();
        renderQuestionsList();
    }
}

function deleteForm(formId) {
    confirmAction('Excluir Formulário', 'Tem certeza? Todas as respostas serão perdidas.', () => {
        forms = forms.filter(f => f.id !== formId);
        saveToLocal();
        renderFormsList();
        showToast('Formulário excluído', 'success');
    });
}

// ==================== RESPONDER FORMULÁRIO ====================
function openResponseForm(formId) {
    const form = forms.find(f => f.id === formId);
    if (!form) return;
    
    currentForm = form;
    
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
    document.getElementById('view-response').classList.remove('hidden');
    document.getElementById('response-form-name').textContent = form.name;
    
    const container = document.getElementById('response-questions');
    container.innerHTML = form.questions.map((q, idx) => `
        <div class="form-group" id="response-q-${q.id}">
            <label class="label">${escapeHtml(q.text)}${q.required ? '<span style="color: var(--error);"> *</span>' : ''}</label>
            ${renderResponseInput(q, idx)}
        </div>
    `).join('');
}

function renderResponseInput(q, idx) {
    const name = `resp_${q.id}`;
    const inputId = `input_${q.id}`;
    
    switch(q.type) {
        case 'text':
            return `<input type="text" class="input" id="${inputId}" name="${name}" placeholder="Digite sua resposta...">`;
        case 'textarea':
            return `<textarea class="textarea" id="${inputId}" name="${name}" rows="3" placeholder="Digite sua resposta..."></textarea>`;
        case 'email':
            return `<input type="email" class="input" id="${inputId}" name="${name}" placeholder="exemplo@email.com">`;
        case 'number':
            return `<input type="number" class="input" id="${inputId}" name="${name}" placeholder="Digite um número">`;
        case 'radio':
            return `<div class="radio-group">${q.options.map(opt => `
                <label class="radio-option" style="display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;">
                    <input type="radio" name="${name}" value="${escapeHtml(opt)}"> ${escapeHtml(opt)}
                </label>
            `).join('')}</div>`;
        case 'checkbox':
            return `<div class="checkbox-group">${q.options.map(opt => `
                <label class="checkbox-option" style="display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;">
                    <input type="checkbox" name="${name}" value="${escapeHtml(opt)}"> ${escapeHtml(opt)}
                </label>
            `).join('')}</div>`;
        case 'select':
            return `<select class="select" id="${inputId}" name="${name}">
                <option value="">Selecione...</option>
                ${q.options.map(opt => `<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`).join('')}
            </select>`;
        case 'scale':
            return `<div style="display:flex;gap:12px;flex-wrap:wrap;">${[1,2,3,4,5].map(n => `
                <label style="flex:1;text-align:center;padding:12px;background:var(--bg);border-radius:10px;border:1px solid var(--border);cursor:pointer;">
                    <input type="radio" name="${name}" value="${n}" style="margin-right:8px;"> ${n}
                </label>
            `).join('')}</div>`;
        default:
            return `<input type="text" class="input" id="${inputId}" name="${name}" placeholder="Digite sua resposta...">`;
    }
}

function submitResponse() {
    if (!currentForm) return;
    
    const responseData = {};
    let isValid = true;
    
    for (const q of currentForm.questions) {
        const input = document.querySelector(`[name="resp_${q.id}"]`);
        if (!input) continue;
        
        let value;
        if (q.type === 'checkbox') {
            const checked = document.querySelectorAll(`[name="resp_${q.id}"]:checked`);
            value = Array.from(checked).map(cb => cb.value);
        } else if (q.type === 'radio') {
            const checked = document.querySelector(`[name="resp_${q.id}"]:checked`);
            value = checked ? checked.value : '';
        } else {
            value = input.value;
        }
        
        if (q.required && (!value || (Array.isArray(value) && value.length === 0))) {
            showToast(`Por favor, responda: ${q.text}`, 'error');
            isValid = false;
            break;
        }
        
        responseData[q.id] = value || '';
    }
    
    if (isValid) {
        const response = {
            id: generateId(),
            timestamp: new Date().toISOString(),
            data: responseData
        };
        
        currentForm.responses.push(response);
        saveToLocal();
        
        // Salvar na nuvem em background
        salvarRespostaNaNuvem(currentForm.id, response);
        
        showToast('Resposta enviada com sucesso! 🎉', 'success');
        
        // Limpar formulário
        document.querySelectorAll('#view-response input, #view-response textarea, #view-response select').forEach(el => {
            if (el.type === 'radio' || el.type === 'checkbox') {
                el.checked = false;
            } else {
                el.value = '';
            }
        });
        
        // Voltar para home após 1 segundo
        setTimeout(() => goToHome(), 1500);
    }
}

// ==================== VISUALIZAR RESPOSTAS ====================
function viewResponses(formId) {
    const form = forms.find(f => f.id === formId);
    if (!form) return;
    
    currentForm = form;
    
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
    document.getElementById('view-responses-list').classList.remove('hidden');
    document.getElementById('responses-list-name').textContent = form.name;
    
    const container = document.getElementById('responses-list-container');
    
    if (form.responses.length === 0) {
        container.innerHTML = `<div class="empty-state"><p>📭 Nenhuma resposta ainda</p><button class="btn btn-primary" onclick="openResponseForm('${form.id}')">Responder agora</button></div>`;
        return;
    }
    
    // Ordenar do mais recente para o mais antigo
    const sorted = [...form.responses].reverse();
    
    container.innerHTML = sorted.map((resp, idx) => {
        const date = new Date(resp.timestamp);
        const preview = getResponsePreview(form.questions, resp.data);
        return `
            <div class="card" style="margin-bottom: 12px;">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 12px;">
                    <span style="font-size: 12px; color: var(--text-muted);">📅 ${date.toLocaleDateString()} ${date.toLocaleTimeString()}</span>
                    <button class="btn btn-sm btn-danger" onclick="deleteResponse('${form.id}', '${resp.id}')">🗑️</button>
                </div>
                <div style="font-size: 14px;">${preview}</div>
                <button class="btn btn-sm" style="margin-top: 12px;" onclick="showFullResponse(${idx})">Ver detalhes</button>
            </div>
        `;
    }).join('');
    
    // Armazenar temporariamente para visualização de detalhes
    window.currentResponsesList = form.responses;
    window.currentQuestionsList = form.questions;
}

function getResponsePreview(questions, data) {
    const firstTextQ = questions.find(q => q.type === 'text' && data[q.id]);
    if (firstTextQ) {
        return `👤 <strong>${escapeHtml(firstTextQ.text)}:</strong> ${escapeHtml(data[firstTextQ.id].substring(0, 50))}`;
    }
    const firstQ = questions[0];
    if (firstQ && data[firstQ.id]) {
        let val = data[firstQ.id];
        if (Array.isArray(val)) val = val.join(', ');
        return `<strong>${escapeHtml(firstQ.text)}:</strong> ${escapeHtml(String(val).substring(0, 50))}`;
    }
    return 'Resposta enviada';
}

function showFullResponse(index) {
    const response = window.currentResponsesList[index];
    const questions = window.currentQuestionsList;
    
    let html = `<div style="max-height: 400px; overflow-y: auto;">`;
    for (const q of questions) {
        const answer = response.data[q.id];
        let displayAnswer = '-';
        if (answer) {
            if (Array.isArray(answer)) displayAnswer = answer.join(', ');
            else displayAnswer = String(answer);
        }
        html += `
            <div style="margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border);">
                <div style="font-weight: 600; margin-bottom: 8px;">${escapeHtml(q.text)}${q.required ? ' *' : ''}</div>
                <div style="color: var(--text-muted);">${escapeHtml(displayAnswer)}</div>
            </div>
        `;
    }
    html += `</div>`;
    
    // Criar modal simples para exibir
    const modal = document.createElement('div');
    modal.className = 'modal active';
    modal.innerHTML = `
        <div class="modal-content" style="max-width: 500px;" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 16px;">📋 Detalhes da Resposta</h3>
            ${html}
            <div style="margin-top: 20px; display: flex; justify-content: flex-end;">
                <button class="btn" onclick="this.closest('.modal').remove()">Fechar</button>
            </div>
        </div>
    `;
    modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    document.body.appendChild(modal);
}

function deleteResponse(formId, responseId) {
    confirmAction('Excluir Resposta', 'Tem certeza que deseja excluir esta resposta?', () => {
        const form = forms.find(f => f.id === formId);
        if (form) {
            form.responses = form.responses.filter(r => r.id !== responseId);
            saveToLocal();
            viewResponses(formId);
            showToast('Resposta excluída', 'success');
        }
    });
}

function clearAllResponses() {
    if (!currentForm) return;
    confirmAction('Limpar Todas', `Tem certeza que deseja excluir TODAS as ${currentForm.responses.length} respostas?`, () => {
        currentForm.responses = [];
        saveToLocal();
        viewResponses(currentForm.id);
        showToast('Todas as respostas foram excluídas', 'success');
    });
}

// ==================== CRIAR NOVO FORMULÁRIO ====================
function openNewFormModal() {
    document.getElementById('new-form-name').value = '';
    document.getElementById('new-form-modal').classList.add('active');
}

function createNewForm() {
    const name = document.getElementById('new-form-name').value.trim();
    if (!name) {
        showToast('Digite um nome para o formulário', 'error');
        return;
    }
    
    const newForm = {
        id: generateId(),
        name: name,
        description: '',
        createdAt: new Date().toISOString(),
        questions: [],
        responses: []
    };
    
    forms.push(newForm);
    saveToLocal();
    
    closeModal();
    showToast(`"${name}" criado!`, 'success');
    
    openFormEditor(newForm.id);
}

// ==================== CARREGAR VIA URL ====================
function loadFormFromURL() {
    const urlParams = new URLSearchParams(window.location.search);
    const formId = urlParams.get('form');
    
    if (formId) {
        const form = forms.find(f => f.id === formId);
        if (form) {
            // Limpar URL antes de abrir
            window.history.replaceState({}, document.title, window.location.pathname);
            openResponseForm(formId);
        } else {
            // Tentar buscar da nuvem primeiro
            buscarTudoDaNuvem().then(() => {
                const formAfterSync = forms.find(f => f.id === formId);
                if (formAfterSync) {
                    window.history.replaceState({}, document.title, window.location.pathname);
                    openResponseForm(formId);
                } else {
                    showToast('Formulário não encontrado', 'error');
                }
            });
        }
    }
}

// ==================== INICIALIZAÇÃO ====================
loadFromLocal();
renderFormsList();
loadFormFromURL();
</script>
</body>
