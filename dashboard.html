<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard SIPAT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f8fafc; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #059669, #047857); color: white; padding: 24px; border-radius: 12px; margin-bottom: 24px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .kpi-card { background: white; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #e2e8f0; }
        .kpi-value { font-size: 36px; font-weight: 800; color: #059669; }
        .filters-section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 24px; border: 1px solid #e2e8f0; }
        .filters-grid { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
        .filter-group { flex: 1; min-width: 150px; }
        .filter-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        .filter-group input, .filter-group select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #059669; color: white; }
        .btn-secondary { background: #f1f5f9; border: 1px solid #e2e8f0; }
        .chart-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 24px; border: 1px solid #e2e8f0; }
        .bar-item { margin-bottom: 12px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
        .bar-track { background: #e2e8f0; border-radius: 20px; height: 30px; overflow: hidden; }
        .bar-fill { background: linear-gradient(90deg, #059669, #4f46e5); height: 100%; border-radius: 20px; display: flex; align-items: center; justify-content: flex-end; padding-right: 12px; color: white; font-size: 12px; }
        .loading { text-align: center; padding: 60px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #059669; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .word-cloud { display: flex; flex-wrap: wrap; gap: 12px; padding: 20px; background: #f8fafc; border-radius: 12px; min-height: 150px; }
        .word-cloud span { padding: 4px 12px; border-radius: 20px; background: #e0e7ff; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .stars { color: #f59e0b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 Dashboard SIPAT</h1>
        <p>Pesquisa Interativa para Planejamento da SIPAT</p>
    </div>

    <div class="filters-section">
        <div class="filters-grid">
            <div class="filter-group">
                <label>📅 Data inicial</label>
                <input type="date" id="dataInicio">
            </div>
            <div class="filter-group">
                <label>📅 Data final</label>
                <input type="date" id="dataFim">
            </div>
            <div class="filter-group">
                <label>🏷️ Identificação</label>
                <select id="filtroIdentificacao">
                    <option value="todos">Todos</option>
                    <option value="Sim">Identificados</option>
                    <option value="Não">Anônimos</option>
                </select>
            </div>
            <div class="filter-group">
                <button class="btn btn-primary" onclick="aplicarFiltros()">🔍 Aplicar</button>
                <button class="btn btn-secondary" onclick="limparFiltros()">🔄 Limpar</button>
            </div>
        </div>
    </div>

    <div id="dashboard-content">
        <div class="loading"><div class="spinner"></div><p>Carregando dados...</p></div>
    </div>
</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbz9WtuMVBlqzqFeI9pGBB0OJoltqbEM_7VXRZcol-BbRJVuUpQSJ_XC5u6VMX9B10b-ig/exec';

let dadosGlobais = { respostas: [], formData: null };

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function carregarFormulario() {
    try {
        const url = `${SHEETS_URL}?acao=carregarTudo&aba=forms`;
        const response = await fetch(url);
        const result = await response.json();
        
        if (result.status === 'sucesso' && result.dados) {
            const form = result.dados.find(f => f.name === 'Pesquisa Interativa para Planejamento da SIPAT');
            return form || result.dados[0];
        }
        return null;
    } catch (e) {
        console.error('Erro:', e);
        return null;
    }
}

async function carregarRespostas(nomeFormulario) {
    try {
        const url = `${SHEETS_URL}?acao=carregarRespostas&nomeFormulario=${encodeURIComponent(nomeFormulario)}`;
        const response = await fetch(url);
        const result = await response.json();
        if (result.status === 'sucesso' && result.dados) {
            return result.dados;
        }
        return [];
    } catch (e) {
        console.error('Erro:', e);
        return [];
    }
}

function extrairRespostas(respostasRaw, perguntas) {
    const respostas = [];
    const perguntasValidas = perguntas.filter(p => p.title && p.title.trim() !== '');
    
    for (const row of respostasRaw) {
        const respostaData = row.data || row;
        const timestamp = row.timestamp || row['Data/Hora'] || new Date().toISOString();
        
        const resposta = { timestamp: timestamp, data: {} };
        
        for (const pergunta of perguntasValidas) {
            let valor = respostaData[pergunta.title];
            if (!valor) {
                for (const key in respostaData) {
                    if (key.toLowerCase() === pergunta.title.toLowerCase()) {
                        valor = respostaData[key];
                        break;
                    }
                }
            }
            if (pergunta.type === 'scale' && valor && !isNaN(parseFloat(valor))) {
                valor = parseFloat(valor);
            }
            resposta.data[pergunta.id] = valor || '';
        }
        respostas.push(resposta);
    }
    return respostas;
}

function processarDados(respostas, formData, filtros) {
    let dados = [...respostas];
    
    if (filtros.dataInicio) {
        dados = dados.filter(r => new Date(r.timestamp) >= new Date(filtros.dataInicio));
    }
    if (filtros.dataFim) {
        const dataFim = new Date(filtros.dataFim);
        dataFim.setHours(23,59,59);
        dados = dados.filter(r => new Date(r.timestamp) <= dataFim);
    }
    
    const perguntaIdent = formData.form.questions.find(q => q.title === 'Você gostaria de se identificar?');
    if (perguntaIdent && filtros.identificacao !== 'todos') {
        dados = dados.filter(r => r.data[perguntaIdent.id] === filtros.identificacao);
    }
    
    return dados;
}

function contarCheckbox(respostas, pergunta) {
    const contagem = {};
    for (const opcao of (pergunta.options || [])) {
        contagem[opcao] = 0;
    }
    for (const resposta of respostas) {
        const valor = resposta.data[pergunta.id];
        if (valor) {
            if (Array.isArray(valor)) {
                valor.forEach(v => { if (contagem[v] !== undefined) contagem[v]++; else contagem[v] = 1; });
            } else if (typeof valor === 'string' && valor.includes(',')) {
                valor.split(',').map(v => v.trim()).forEach(v => { if (contagem[v] !== undefined) contagem[v]++; else contagem[v] = 1; });
            } else {
                if (contagem[valor] !== undefined) contagem[valor]++; else contagem[valor] = 1;
            }
        }
    }
    return Object.entries(contagem).sort((a,b) => b[1] - a[1]).slice(0,10);
}

function renderizarBarChart(dados) {
    if (!dados || dados.length === 0) return '<div>Sem dados</div>';
    const max = Math.max(...dados.map(d => d[1]));
    return `<div>${dados.map(([label, count]) => `
        <div class="bar-item">
            <div class="bar-label"><span>${escapeHtml(label.substring(0,40))}</span><span>${count}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width: ${(count/max)*100}%">${Math.round((count/max)*100)}%</div></div>
        </div>
    `).join('')}</div>`;
}

function gerarWordCloud(respostas, perguntasTexto, formData) {
    const palavras = {};
    const stopWords = ['que','como','uma','para','com','sem','mais','muito','bem','pode','ser','ter','fazer'];
    const perguntaNome = formData.form.questions.find(q => q.title === 'Qual seu nome completo?');
    const idNome = perguntaNome?.id;
    
    for (const resposta of respostas) {
        for (const pergunta of perguntasTexto) {
            if (pergunta.id === idNome) continue;
            const texto = resposta.data[pergunta.id];
            if (texto && typeof texto === 'string') {
                texto.toLowerCase().split(/[\s,;.!?]+/).forEach(palavra => {
                    if (palavra.length > 3 && !stopWords.includes(palavra)) {
                        palavras[palavra] = (palavras[palavra] || 0) + 1;
                    }
                });
            }
        }
    }
    return Object.entries(palavras).sort((a,b) => b[1] - a[1]).slice(0,30);
}

function renderizarWordCloud(palavras) {
    if (!palavras || palavras.length === 0) return '<div>Nenhuma sugestão ainda</div>';
    const minFreq = Math.min(...palavras.map(p => p[1]));
    const maxFreq = Math.max(...palavras.map(p => p[1]));
    return `<div class="word-cloud">${palavras.map(([palavra, freq]) => {
        const size = 12 + (freq - minFreq) / (maxFreq - minFreq) * 16;
        return `<span style="font-size: ${size}px;">${escapeHtml(palavra)}</span>`;
    }).join('')}</div>`;
}

function renderizarDashboard(respostas, formData, areasInteresse, atividades, escalas, wordCloud) {
    const total = respostas.length;
    const perguntaParticipacao = formData.form.questions.find(q => q.title === 'Você gostaria de participar mais ativamente da SIPAT, contribuindo com ideias, organização ou atividades?');
    let participacao = { sim:0, talvez:0, nao:0 };
    if (perguntaParticipacao) {
        participacao.sim = respostas.filter(r => r.data[perguntaParticipacao.id] === 'Sim').length;
        participacao.talvez = respostas.filter(r => r.data[perguntaParticipacao.id] === 'Talvez').length;
        participacao.nao = respostas.filter(r => r.data[perguntaParticipacao.id] === 'Não').length;
    }
    
    return `
        <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-value">${total}</div><div>Total de respostas</div></div>
            <div class="kpi-card"><div class="kpi-value">${Math.round((participacao.sim/total)*100) || 0}%</div><div>Querem participar</div></div>
        </div>
        
        <div class="chart-card"><h3>📚 Áreas de interesse</h3>${renderizarBarChart(areasInteresse)}</div>
        <div class="chart-card"><h3>🎪 Atividades preferidas</h3>${renderizarBarChart(atividades)}</div>
        <div class="chart-card"><h3>⭐ Avaliação das atividades (média 1-5)</h3>${renderizarTabelaEscalas(escalas)}</div>
        <div class="chart-card"><h3>💡 Sugestões dos participantes</h3>${renderizarWordCloud(wordCloud)}</div>
    `;
}

function renderizarTabelaEscalas(medias) {
    if (!medias || Object.keys(medias).length === 0) return '<div>Sem dados</div>';
    const sorted = Object.entries(medias).sort((a,b) => b[1] - a[1]);
    return `<table><thead><tr><th>Atividade</th><th>Média</th><th>Avaliação</th></tr></thead><tbody>
        ${sorted.map(([nome, media]) => {
            const estrelas = '★'.repeat(Math.round(media)) + '☆'.repeat(5 - Math.round(media));
            return `<tr><td>${escapeHtml(nome)}</td><td>${media.toFixed(1)}/5</td><td class="stars">${estrelas}</td></tr>`;
        }).join('')}
    </tbody></table>`;
}

async function carregarDados() {
    const container = document.getElementById('dashboard-content');
    container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Carregando...</p></div>';
    
    try {
        const formData = await carregarFormulario();
        if (!formData) {
            container.innerHTML = '<div class="loading">❌ Formulário não encontrado</div>';
            return;
        }
        
        const respostasRaw = await carregarRespostas(formData.name);
        const respostas = extrairRespostas(respostasRaw, formData.form.questions);
        
        dadosGlobais = { respostas, formData };
        aplicarFiltros();
        
    } catch (error) {
        container.innerHTML = `<div class="loading">❌ Erro: ${error.message}</div>`;
    }
}

function aplicarFiltros() {
    const filtros = {
        dataInicio: document.getElementById('dataInicio').value,
        dataFim: document.getElementById('dataFim').value,
        identificacao: document.getElementById('filtroIdentificacao').value
    };
    
    const { respostas, formData } = dadosGlobais;
    if (!respostas || !formData) return;
    
    const dadosFiltrados = processarDados(respostas, formData, filtros);
    
    if (dadosFiltrados.length === 0) {
        document.getElementById('dashboard-content').innerHTML = '<div class="loading">📭 Nenhuma resposta com os filtros selecionados</div>';
        return;
    }
    
    const perguntaAreas = formData.form.questions.find(q => q.title === 'Em quais áreas você gostaria de aprender mais durante a SIPAT?');
    const areas = perguntaAreas ? contarCheckbox(dadosFiltrados, perguntaAreas) : [];
    
    const perguntaAtividades = formData.form.questions.find(q => q.title === 'Que tipo de atividade você gostaria de encontrar durante a SIPAT?');
    const atividades = perguntaAtividades ? contarCheckbox(dadosFiltrados, perguntaAtividades) : [];
    
    const escalas = {};
    for (const pergunta of formData.form.questions.filter(q => q.type === 'scale')) {
        let soma = 0, count = 0;
        for (const resposta of dadosFiltrados) {
            const val = resposta.data[pergunta.id];
            if (val && !isNaN(parseFloat(val))) {
                soma += parseFloat(val);
                count++;
            }
        }
        escalas[pergunta.title] = count > 0 ? soma / count : 0;
    }
    
    const perguntasTexto = formData.form.questions.filter(q => q.type === 'text' || q.type === 'textarea');
    const wordCloud = gerarWordCloud(dadosFiltrados, perguntasTexto, formData);
    
    const html = renderizarDashboard(dadosFiltrados, formData, areas, atividades, escalas, wordCloud);
    document.getElementById('dashboard-content').innerHTML = html;
}

function limparFiltros() {
    document.getElementById('dataInicio').value = '';
    document.getElementById('dataFim').value = '';
    document.getElementById('filtroIdentificacao').value = 'todos';
    aplicarFiltros();
}

carregarDados();
</script>
</body>
</html>
