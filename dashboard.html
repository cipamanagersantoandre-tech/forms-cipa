<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard SIPAT - Pesquisa Interativa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --primary-light: #d1fae5;
            --secondary: #4f46e5;
            --bg: #f8fafc;
            --bg-elev: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 24px 0;
            margin-bottom: 32px;
            border-radius: var(--radius);
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header p { opacity: 0.9; }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .kpi-card {
            background: var(--bg-elev);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border);
            text-align: center;
            transition: all 0.2s;
        }
        .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        .kpi-icon { font-size: 32px; margin-bottom: 12px; }
        .kpi-value { font-size: 36px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
        .kpi-label { font-size: 14px; color: var(--text-muted); }
        .filters-section {
            background: var(--bg-elev);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 32px;
            border: 1px solid var(--border);
        }
        .filters-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .filters-grid { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
        .filter-group { flex: 1; min-width: 180px; }
        .filter-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--text-muted); }
        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg);
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { background: var(--bg); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .section { margin-bottom: 40px; }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--primary);
        }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 24px; }
        .chart-card { background: var(--bg-elev); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); }
        .chart-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
        .bar-chart { margin-top: 16px; }
        .bar-item { margin-bottom: 16px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
        .bar-label span:first-child { font-weight: 500; }
        .bar-label span:last-child { color: var(--text-muted); }
        .bar-track { background: var(--bg); border-radius: 20px; height: 32px; overflow: hidden; }
        .bar-fill {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            height: 100%;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            transition: width 0.5s ease;
        }
        .pie-container { display: flex; flex-wrap: wrap; gap: 24px; align-items: center; }
        .pie-chart { width: 180px; height: 180px; border-radius: 50%; margin: 0 auto; }
        .pie-legend { flex: 1; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }
        .legend-color { width: 16px; height: 16px; border-radius: 4px; }
        .scale-table { width: 100%; border-collapse: collapse; }
        .scale-table th, .scale-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .scale-table th { font-weight: 600; color: var(--text-muted); font-size: 13px; }
        .stars { color: var(--warning); letter-spacing: 2px; }
        .progress-bar-small { width: 100px; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; display: inline-block; margin-left: 8px; }
        .progress-fill-small { height: 100%; background: var(--primary); border-radius: 4px; }
        .loading { text-align: center; padding: 60px; color: var(--text-muted); }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .toast { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-top: 8px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-lg); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } .filters-grid { flex-direction: column; } .filter-group { width: 100%; } .section-title { font-size: 18px; } }
        .word-cloud { display: flex; flex-wrap: wrap; gap: 12px; padding: 20px; background: var(--bg); border-radius: var(--radius); min-height: 200px; align-items: center; justify-content: center; }
        .word-cloud span { cursor: pointer; transition: all 0.2s; padding: 4px 8px; border-radius: 20px; }
        .word-cloud span:hover { background: var(--primary-light); transform: scale(1.05); }
        .export-buttons { display: flex; gap: 12px; margin-bottom: 20px; justify-content: flex-end; }
        .error-box { background: #fee2e2; border-left: 4px solid var(--error); padding: 20px; border-radius: var(--radius); margin: 20px 0; }
        .debug-panel { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-top: 20px; font-family: monospace; font-size: 12px; max-height: 300px; overflow: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="container" style="padding: 0 20px;">
            <h1>📊 Dashboard SIPAT</h1>
            <p>Pesquisa Interativa para Planejamento da SIPAT</p>
        </div>
    </div>

    <div class="filters-section">
        <div class="filters-title">🔍 Filtros</div>
        <div class="filter-group" style="min-width: 250px;">
            <label>📋 Selecione o formulário</label>
            <select id="seletorFormulario" onchange="trocarFormulario()">
                <option value="">Carregando formulários...</option>
            </select>
        </div>
        <div class="filters-grid">
            <div class="filter-group">
                <label>📅 Data inicial</label>
                <input type="date" id="dataInicio">
            </div>
            <div class="filter-group">
                <label>📅 Data final</label>
                <input type="date" id="dataFim">
            </div>
            <div class="filter-group">
                <label>🏷️ Identificação</label>
                <select id="filtroIdentificacao">
                    <option value="todos">Todos</option>
                    <option value="Sim">Identificados (Sim)</option>
                    <option value="Não">Anônimos (Não)</option>
                </select>
            </div>
<div class="filter-group">
    <label>🎯 Participação ativa</label>
    <select id="filtroParticipacao">
        <option value="todos">Todos</option>
        <option value="Sim">Sim</option>
        <option value="Talvez">Talvez</option>
        <option value="Não">Não</option>
    </select>
</div>

<div class="filter-group">
    <label>👤 Buscar por nome</label>
    <input type="text" id="filtroNome" list="listaNomes" placeholder="Digite ou selecione um nome...">
    <datalist id="listaNomes">
        <option value="">Carregando nomes...</option>
    </datalist>
</div>
            <div class="filter-group">
                <button class="btn btn-primary" onclick="aplicarFiltros()">🔍 Aplicar filtros</button>
                <button class="btn btn-secondary" onclick="limparFiltros()">🔄 Limpar</button>
            </div>
<div class="filter-group">
    <label>⏱️ Período rápido</label>
    <div style="display: flex; gap: 8px;">
        <button class="btn btn-secondary" onclick="filtrarUltimosDias(7)" style="padding: 8px 12px;">7 dias</button>
        <button class="btn btn-secondary" onclick="filtrarUltimosDias(30)" style="padding: 8px 12px;">30 dias</button>
        <button class="btn btn-secondary" onclick="filtrarUltimosDias(90)" style="padding: 8px 12px;">90 dias</button>
    </div>
</div>
        </div>
    </div>

    <div class="export-buttons">
        <button class="btn btn-secondary" onclick="exportarCSV()">📥 Exportar CSV</button>
        <button class="btn btn-primary" onclick="carregarDados()">🔄 Atualizar dados</button>
    </div>

    <div id="dashboard-content">
        <div class="loading">
            <div class="spinner"></div>
            <p>Carregando dados do Google Sheets...</p>
        </div>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script>
// ==================== CONFIGURAÇÃO ====================
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbz9WtuMVBlqzqFeI9pGBB0OJoltqbEM_7VXRZcol-BbRJVuUpQSJ_XC5u6VMX9B10b-ig/exec';

// ==================== FUNÇÕES ====================
function showToast(msg, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span><span>${msg}</span>`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// Função para testar a conexão com o Google Sheets
async function testarConexao() {
    console.log('🔍 Testando conexão com Google Sheets...');
    try {
        const url = `${SHEETS_URL}?acao=carregarTudo&aba=forms`;
        console.log('📡 URL:', url);
        const response = await fetch(url);
        console.log('📊 Status:', response.status);
        const result = await response.json();
        console.log('📦 Resposta completa:', result);
        return result;
    } catch (error) {
        console.error('❌ Erro na conexão:', error);
        return { status: 'erro', mensagem: error.message };
    }
}

// Carregar dados do formulário (não usada diretamente, mantida para compatibilidade)
async function carregarFormulario() {
    try {
        const url = `${SHEETS_URL}?acao=carregarTudo&aba=forms`;
        const response = await fetch(url);
        const result = await response.json();
        
        if (result.status === 'sucesso' && result.dados && result.dados.length > 0) {
            // Retorna o primeiro formulário da lista
            return result.dados[0];
        }
        return null;
    } catch (e) {
        console.error('❌ Erro ao carregar formulário:', e);
        return null;
    }
}

// Carregar respostas do formulário
async function carregarRespostas(nomeFormulario) {
    try {
        const url = `${SHEETS_URL}?acao=carregarRespostas&nomeFormulario=${encodeURIComponent(nomeFormulario)}`;
        console.log('📡 Buscando respostas em:', url);
        const response = await fetch(url);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const result = await response.json();
        console.log('📦 Respostas brutas:', result);
        
        if (result.status === 'sucesso' && result.dados) {
            console.log(`📋 Encontradas ${result.dados.length} respostas`);
            return result.dados;
        }
        return [];
    } catch (e) {
        console.error('❌ Erro ao carregar respostas:', e);
        return [];
    }
}

// Extrair respostas do formato do Sheets
function extrairRespostas(respostasRaw, perguntas) {
    const respostas = [];
    
    if (!respostasRaw || respostasRaw.length === 0) {
        console.log('⚠️ Nenhuma resposta bruta para processar');
        return respostas;
    }
    
    console.log('🔧 Processando', respostasRaw.length, 'respostas brutas');
    
    // Filtrar apenas perguntas com título válido (não vazio e não é "Nova pergunta")
    const perguntasValidas = perguntas.filter(p => p.title && p.title.trim() !== '' && p.title !== 'Nova pergunta');
    console.log('📋 Perguntas válidas:', perguntasValidas.length);
    
    for (let i = 0; i < respostasRaw.length; i++) {
        const row = respostasRaw[i];
        
        // Pega os dados da resposta (estão dentro da propriedade 'data')
        const respostaData = row.data || row;
        
        // Verificar se tem timestamp
        const timestamp = row.timestamp || row['Data/Hora'] || new Date().toISOString();
        
        if (!timestamp) {
            console.log('⚠️ Resposta sem timestamp, pulando...');
            continue;
        }
        
        const resposta = { 
            timestamp: timestamp, 
            data: {} 
        };
        
        // Para cada pergunta válida do formulário, buscar o valor na resposta
        for (const pergunta of perguntasValidas) {
            // Busca o valor usando o título da pergunta como chave
            let valor = respostaData[pergunta.title];
            
            // Se não achou, tenta limpar caracteres especiais
            if (!valor) {
                const tituloLimpo = pergunta.title.replace(/[^\w\s]/g, '');
                for (const key in respostaData) {
                    const keyLimpa = key.replace(/[^\w\s]/g, '');
                    if (keyLimpa === tituloLimpo) {
                        valor = respostaData[key];
                        break;
                    }
                }
            }
            
            // VERIFICAÇÃO DE TIPO: só chama .includes() se for string
            if (valor && typeof valor === 'string') {
                if (valor.includes('📎') || valor.includes('(nenhum arquivo') || valor === '-') {
                    valor = '';
                }
            }
            
            // Para perguntas de escala, garantir que é número
            if (pergunta.type === 'scale' && valor && !isNaN(parseFloat(valor))) {
                valor = parseFloat(valor);
            }
            
            resposta.data[pergunta.id] = valor || '';
        }
        
        respostas.push(resposta);
        console.log(`✅ Resposta ${i + 1} processada com ${Object.keys(resposta.data).length} campos`);
    }
    
    console.log(`\n📊 Total extraído: ${respostas.length} respostas`);
    return respostas;
}

// Processar dados para o dashboard
function processarDados(respostas, formData, filtros) {
    let dadosFiltrados = [...respostas];
    
    // Aplicar filtro de data
    if (filtros.dataInicio) {
        const dataInicio = new Date(filtros.dataInicio);
        dadosFiltrados = dadosFiltrados.filter(r => new Date(r.timestamp) >= dataInicio);
    }
    if (filtros.dataFim) {
        const dataFim = new Date(filtros.dataFim);
        dataFim.setHours(23, 59, 59);
        dadosFiltrados = dadosFiltrados.filter(r => new Date(r.timestamp) <= dataFim);
    }
    
    // Aplicar filtro de identificação
    const perguntaIdentificacao = formData.form.questions.find(q => q.title === 'Você gostaria de se identificar?');
    if (perguntaIdentificacao && filtros.identificacao !== 'todos') {
        dadosFiltrados = dadosFiltrados.filter(r => r.data[perguntaIdentificacao.id] === filtros.identificacao);
    }
    
    // Aplicar filtro de participação ativa
    const perguntaParticipacao = formData.form.questions.find(q => q.title === 'Você gostaria de participar mais ativamente da SIPAT, contribuindo com ideias, organização ou atividades?');
    if (perguntaParticipacao && filtros.participacao !== 'todos') {
        dadosFiltrados = dadosFiltrados.filter(r => r.data[perguntaParticipacao.id] === filtros.participacao);
    }
    
// Aplicar filtro por nome (participante específico)
if (filtros.nome && filtros.nome.trim() !== '') {
    const perguntaNome = formData.form.questions.find(q => q.title === 'Qual seu nome completo?');
    if (perguntaNome) {
        dadosFiltrados = dadosFiltrados.filter(r => {
            const nome = r.data[perguntaNome.id] || '';
            return nome.toLowerCase().includes(filtros.nome.toLowerCase());
        });
    }
}



// Calcular KPIs
function calcularKPIs(respostas, formData) {
    const total = respostas.length;
    
    // Taxa de identificação
    const perguntaIdentificacao = formData.form.questions.find(q => q.title === 'Você gostaria de se identificar?');
    let taxaIdentificacao = 0;
    if (perguntaIdentificacao) {
        const identificados = respostas.filter(r => r.data[perguntaIdentificacao.id] === 'Sim').length;
        taxaIdentificacao = total > 0 ? Math.round((identificados / total) * 100) : 0;
    }
    
    // Taxa de participação ativa
    const perguntaParticipacao = formData.form.questions.find(q => q.title === 'Você gostaria de participar mais ativamente da SIPAT, contribuindo com ideias, organização ou atividades?');
    let taxaParticipacao = 0;
    let participacaoDetalhe = { sim: 0, talvez: 0, nao: 0 };
    if (perguntaParticipacao) {
        participacaoDetalhe.sim = respostas.filter(r => r.data[perguntaParticipacao.id] === 'Sim').length;
        participacaoDetalhe.talvez = respostas.filter(r => r.data[perguntaParticipacao.id] === 'Talvez').length;
        participacaoDetalhe.nao = respostas.filter(r => r.data[perguntaParticipacao.id] === 'Não').length;
        taxaParticipacao = total > 0 ? Math.round((participacaoDetalhe.sim / total) * 100) : 0;
    }
    
    // Média de interesse nas atividades (escalas)
    const perguntasEscala = formData.form.questions.filter(q => q.type === 'scale');
    let somaEscalas = 0;
    let totalEscalas = 0;
    const mediasEscalas = {};
    
    for (const pergunta of perguntasEscala) {
        let soma = 0;
        let count = 0;
        for (const resposta of respostas) {
            const valor = resposta.data[pergunta.id];
            if (valor && !isNaN(parseFloat(valor))) {
                soma += parseFloat(valor);
                count++;
            }
        }
        const media = count > 0 ? (soma / count) : 0;
        mediasEscalas[pergunta.title] = media;
        somaEscalas += media;
        totalEscalas++;
    }
    
    const mediaGeral = totalEscalas > 0 ? (somaEscalas / totalEscalas) : 0;
    
    return {
        total,
        taxaIdentificacao,
        taxaParticipacao,
        participacaoDetalhe,
        mediaGeral,
        mediasEscalas
    };
}

// Contar respostas de checkbox
function contarCheckbox(respostas, pergunta, formData) {
    const contagem = {};
    const opcoes = pergunta.options || [];
    
    for (const opcao of opcoes) {
        contagem[opcao] = 0;
    }
    
    for (const resposta of respostas) {
        const valor = resposta.data[pergunta.id];
        if (valor) {
            if (Array.isArray(valor)) {
                for (const item of valor) {
                    if (contagem[item] !== undefined) contagem[item]++;
                    else contagem[item] = (contagem[item] || 0) + 1;
                }
            } else if (typeof valor === 'string' && valor.includes(',')) {
                const itens = valor.split(',').map(v => v.trim());
                for (const item of itens) {
                    if (contagem[item] !== undefined) contagem[item]++;
                    else contagem[item] = (contagem[item] || 0) + 1;
                }
            } else {
                if (contagem[valor] !== undefined) contagem[valor]++;
                else contagem[valor] = (contagem[valor] || 0) + 1;
            }
        }
    }
    
    return Object.entries(contagem)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10);
}

// Gerar nuvem de palavras (IGNORANDO nomes dos participantes)
function gerarWordCloud(respostas, perguntasTexto, formData) {
    const palavras = {};
    const stopWords = ['que', 'como', 'uma', 'para', 'com', 'sem', 'sobre', 'pelo', 'pela', 'mais', 'muito', 'bem', 'pode', 'ser', 'ter', 'fazer', 'gostaria', 'você', 'sua', 'seu', 'ele', 'ela', 'isso', 'aquele', 'aquela'];
    
    // Pega o ID da pergunta de nome para excluir
    const perguntaNome = formData.form.questions.find(q => q.title === 'Qual seu nome completo?');
    const idNome = perguntaNome ? perguntaNome.id : null;
    
    for (const resposta of respostas) {
        for (const pergunta of perguntasTexto) {
            // PULA a pergunta de nome completo
            if (pergunta.id === idNome) {
                continue;
            }
            
            const texto = resposta.data[pergunta.id];
            if (texto && typeof texto === 'string') {
                // Remove possíveis nomes do texto (palavras que começam com letra maiúscula e são curtas)
                let textoLimpo = texto;
                
                // Remove palavras que parecem nomes próprios (começam com maiúscula e têm 2-20 letras)
                // Mas preserva palavras importantes como "SIPAT", "Saúde", "Segurança"
                const palavrasImportantes = ['SIPAT', 'Saúde', 'Segurança', 'Bem-estar', 'Empresa', 'Trabalho'];
                const palavrasTexto = texto.split(/\s+/);
                const palavrasFiltradas = palavrasTexto.filter(palavra => {
                    // Se for uma palavra importante, mantém
                    if (palavrasImportantes.some(imp => palavra.toLowerCase().includes(imp.toLowerCase()))) {
                        return true;
                    }
                    // Se começar com maiúscula e tiver entre 2 e 20 letras, provavelmente é nome
                    if (palavra.match(/^[A-Z][a-z]{1,19}$/)) {
                        return false;
                    }
                    return true;
                });
                textoLimpo = palavrasFiltradas.join(' ');
                
                const palavrasDoTexto = textoLimpo.toLowerCase().split(/[\s,;.!?]+/);
                for (const palavra of palavrasDoTexto) {
                    if (palavra.length > 3 && !stopWords.includes(palavra)) {
                        palavras[palavra] = (palavras[palavra] || 0) + 1;
                    }
                }
            }
        }
    }
    
    return Object.entries(palavras)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 30);
}

// Renderizar KPI cards
function renderizarKPIs(kpis) {
    return `
        <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-icon">📊</div><div class="kpi-value">${kpis.total}</div><div class="kpi-label">Total de respostas</div></div>
            <div class="kpi-card"><div class="kpi-icon">👤</div><div class="kpi-value">${kpis.taxaIdentificacao}%</div><div class="kpi-label">Taxa de identificação</div></div>
            <div class="kpi-card"><div class="kpi-icon">🎯</div><div class="kpi-value">${kpis.taxaParticipacao}%</div><div class="kpi-label">Querem participar ativamente</div></div>
            <div class="kpi-card"><div class="kpi-icon">⭐</div><div class="kpi-value">${kpis.mediaGeral.toFixed(1)} / 5</div><div class="kpi-label">Média geral de interesse</div></div>
        </div>
    `;
}

// Renderizar gráfico de barras
function renderizarBarChart(dados, titulo) {
    if (!dados || dados.length === 0) return '<div>Sem dados suficientes</div>';
    
    const maxCount = Math.max(...dados.map(d => d[1]));
    
    return `
        <div class="bar-chart">
            ${dados.map(([label, count]) => `
                <div class="bar-item">
                    <div class="bar-label"><span>${escapeHtml(label.substring(0, 40))}${label.length > 40 ? '...' : ''}</span><span>${count}</span></div>
                    <div class="bar-track"><div class="bar-fill" style="width: ${(count / maxCount) * 100}%">${(count / maxCount * 100).toFixed(0)}%</div></div>
                </div>
            `).join('')}
        </div>
    `;
}

// Renderizar gráfico de pizza
function renderizarPizza(dados) {
    if (!dados || dados.length === 0) return '<div>Sem dados suficientes</div>';
    
    let cores = ['#059669', '#4f46e5', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#84cc16'];
    let total = dados.reduce((sum, d) => sum + d.count, 0);
    let acumulado = 0;
    let conicGradient = '';
    
    for (let i = 0; i < dados.length; i++) {
        const percent = dados[i].count / total * 100;
        conicGradient += `${cores[i % cores.length]} ${acumulado}% ${acumulado + percent}%`;
        if (i < dados.length - 1) conicGradient += ', ';
        acumulado += percent;
    }
    
    return `
        <div class="pie-container">
            <div class="pie-chart" style="background: conic-gradient(${conicGradient})"></div>
            <div class="pie-legend">
                ${dados.map((d, i) => `
                    <div class="legend-item"><div class="legend-color" style="background: ${cores[i % cores.length]}"></div><span>${escapeHtml(d.label)}</span><span style="margin-left: auto; font-weight: 600;">${d.percent.toFixed(1)}% (${d.count})</span></div>
                `).join('')}
            </div>
        </div>
    `;
}

// Renderizar tabela de escalas
function renderizarTabelaEscalas(mediasEscalas) {
    const sorted = Object.entries(mediasEscalas).sort((a, b) => b[1] - a[1]);
    
    return `
        <table class="scale-table">
            <thead><tr><th>Atividade</th><th>Média (1-5)</th><th>Avaliação</th></tr></thead>
            <tbody>
                ${sorted.map(([nome, media]) => {
                    const estrelas = '★'.repeat(Math.round(media)) + '☆'.repeat(5 - Math.round(media));
                    return `<tr><td>${escapeHtml(nome)}</td><td>${media.toFixed(2)} / 5</td><td><span class="stars">${estrelas}</span><div class="progress-bar-small"><div class="progress-fill-small" style="width: ${(media / 5) * 100}%"></div></div></td></tr>`;
                }).join('')}
            </tbody>
        </table>
    `;
}

// Renderizar nuvem de palavras
function renderizarWordCloud(palavras) {
    if (!palavras || palavras.length === 0) return '<div class="word-cloud">Nenhuma sugestão de texto ainda</div>';
    
    const minSize = 12;
    const maxSize = 28;
    const minFreq = Math.min(...palavras.map(p => p[1]));
    const maxFreq = Math.max(...palavras.map(p => p[1]));
    
    return `
        <div class="word-cloud">
            ${palavras.map(([palavra, freq]) => {
                const size = minSize + (freq - minFreq) / (maxFreq - minFreq) * (maxSize - minSize);
                return `<span style="font-size: ${size}px; color: var(--primary);">${escapeHtml(palavra)}</span>`;
            }).join('')}
        </div>
    `;
}

// Renderizar dashboard completo
// Renderizar dashboard DINÂMICO (se adapta ao formulário)
function renderizarDashboard(respostas, formData, kpis, areasInteresse, atividadesPreferidas, temasPessoais, mediasEscalas, wordCloud) {
    let html = renderizarKPIs(kpis);
    
    const temParticipacao = formData.form.questions.some(q => q.title === 'Você gostaria de participar mais ativamente da SIPAT, contribuindo com ideias, organização ou atividades?');
    
    if (temParticipacao && kpis.participacaoDetalhe) {
        html += '<div class="section"><div class="section-title">📈 Participação</div><div class="charts-grid"><div class="chart-card"><h3>🎯 Interesse em participar</h3>' + renderizarPizza([
            { label: 'Sim', count: kpis.participacaoDetalhe.sim, percent: (kpis.participacaoDetalhe.sim / kpis.total) * 100 },
            { label: 'Talvez', count: kpis.participacaoDetalhe.talvez, percent: (kpis.participacaoDetalhe.talvez / kpis.total) * 100 },
            { label: 'Não', count: kpis.participacaoDetalhe.nao, percent: (kpis.participacaoDetalhe.nao / kpis.total) * 100 }
        ]) + '</div></div></div>';
    }
    
    if (areasInteresse && areasInteresse.length > 0) {
        html += '<div class="section"><div class="section-title">📚 Áreas de Interesse</div><div class="charts-grid"><div class="chart-card">' + renderizarBarChart(areasInteresse) + '</div></div></div>';
    }
    
    if (atividadesPreferidas && atividadesPreferidas.length > 0) {
        html += '<div class="section"><div class="section-title">🎪 Atividades Preferidas</div><div class="charts-grid"><div class="chart-card">' + renderizarBarChart(atividadesPreferidas) + '</div></div></div>';
    }
    
    if (mediasEscalas && Object.keys(mediasEscalas).length > 0) {
        html += '<div class="section"><div class="section-title">⭐ Avaliação</div><div class="charts-grid"><div class="chart-card">' + renderizarTabelaEscalas(mediasEscalas) + '</div></div></div>';
    }
    
    if (wordCloud && wordCloud.length > 0) {
        html += '<div class="section"><div class="section-title">💡 Sugestões</div><div class="charts-grid"><div class="chart-card">' + renderizarWordCloud(wordCloud) + '</div></div></div>';
    }
    
    return html;
}  // ← GARANTA QUE TEM ESTA CHAVE AQUI!


// ==================== FUNÇÃO PRINCIPAL ====================
let dadosGlobais = { respostas: [], formData: null };

// ==================== SELETOR DE FORMULÁRIOS ====================
let listaFormularios = [];

// Carregar lista de formulários para o seletor
async function carregarListaFormularios() {
    try {
        const url = `${SHEETS_URL}?acao=carregarTudo&aba=forms`;
        const response = await fetch(url);
        const result = await response.json();
        
        if (result.status === 'sucesso' && result.dados) {
            listaFormularios = result.dados;
            const seletor = document.getElementById('seletorFormulario');
            if (seletor) {
                seletor.innerHTML = '<option value="">-- Selecione um formulário --</option>';
                for (const form of listaFormularios) {
                    const option = document.createElement('option');
                    option.value = form.id;
                    option.textContent = form.name;
                    seletor.appendChild(option);
                }
                const formSIPAT = listaFormularios.find(f => f.name === 'Pesquisa Interativa para Planejamento da SIPAT');
                if (formSIPAT) {
                    seletor.value = formSIPAT.id;
                    trocarFormulario();
                }
            }
        }
    } catch (e) {
        console.error('Erro:', e);
    }
}

// Função chamada quando troca o formulário
async function trocarFormulario() {
    const seletor = document.getElementById('seletorFormulario');
    const formId = seletor.value;
    
    if (!formId) {
        document.getElementById('dashboard-content').innerHTML = '<div class="loading"><p>📋 Selecione um formulário para começar</p></div>';
        return;
    }
    
    const formData = listaFormularios.find(f => f.id === formId);
    if (!formData) return;
    
    console.log('📋 Formulário selecionado:', formData.name);
    
    // Mostrar loading
    const container = document.getElementById('dashboard-content');
    container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Carregando dados do formulário...</p></div>';
    
    // Carregar respostas do formulário selecionado
    const respostasRaw = await carregarRespostas(formData.name);
    const respostas = extrairRespostas(respostasRaw, formData.form.questions);
    
    dadosGlobais = { respostas, formData };
    
    if (respostas.length === 0) {
        container.innerHTML = '<div class="loading"><p>📭 Nenhuma resposta encontrada para este formulário.</p></div>';
        showToast('Nenhuma resposta encontrada!', 'info');
        return;
    }
    
    // Atualizar o título do header
    const headerTitle = document.querySelector('.header h1');
    if (headerTitle) {
        headerTitle.innerHTML = `📊 Dashboard - ${escapeHtml(formData.name)}`;
    }
    
    // Limpar filtros antes de aplicar
    document.getElementById('dataInicio').value = '';
    document.getElementById('dataFim').value = '';
    document.getElementById('filtroIdentificacao').value = 'todos';
    document.getElementById('filtroParticipacao').value = 'todos';
    document.getElementById('filtroNome').value = '';
    
    // Aplicar filtros (vai renderizar o dashboard adaptado)
    aplicarFiltros();
    showToast(`✅ ${respostas.length} respostas carregadas para "${formData.name}"`, 'success');
}

async function carregarDados() {
    const container = document.getElementById('dashboard-content');
    container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Carregando dados do Google Sheets...</p></div>';
    
    try {
        // Testar conexão primeiro
        const teste = await testarConexao();
        console.log('🔍 Teste de conexão:', teste);
        
        const formData = await carregarFormulario();
        if (!formData) {
            container.innerHTML = `
                <div class="error-box">
                    <strong>❌ Formulário não encontrado!</strong><br><br>
                    <p>Possíveis causas:</p>
                    <ul>
                        <li>O Google Sheets pode estar bloqueando requisições externas (CORS)</li>
                        <li>O Web App do Google Apps Script pode não estar publicado</li>
                        <li>O nome do formulário pode ser diferente</li>
                    </ul>
                    <br>
                    <button class="btn btn-primary" onclick="testarConexao()">🔍 Testar conexão novamente</button>
                    <button class="btn btn-secondary" onclick="mostrarDebug()">🐛 Ver detalhes no console</button>
                </div>
            `;
            showToast('Formulário não encontrado! Verifique o console (F12)', 'error');
            return;
        }
        
        const respostasRaw = await carregarRespostas(formData.name);
        const respostas = extrairRespostas(respostasRaw, formData.form.questions);
        
        dadosGlobais = { respostas, formData };
        
        if (respostas.length === 0) {
            container.innerHTML = '<div class="loading"><p>📭 Nenhuma resposta encontrada ainda.</p><p>Compartilhe o link do formulário para começar a coletar respostas!</p></div>';
            showToast('Nenhuma resposta encontrada!', 'info');
            return;
        }
        
        // Aplicar filtros iniciais
        aplicarFiltros();
        
    } catch (error) {
        console.error('❌ Erro:', error);
        container.innerHTML = `
            <div class="error-box">
                <strong>❌ Erro ao carregar dados!</strong><br><br>
                <p>Mensagem: ${error.message}</p><br>
                <p>Possível causa: O Google Sheets pode estar bloqueando requisições (CORS).</p>
                <p>Para resolver, você precisa configurar o Google Apps Script para aceitar CORS ou usar um proxy.</p>
                <br>
                <button class="btn btn-primary" onclick="carregarDados()">🔄 Tentar novamente</button>
                <button class="btn btn-secondary" onclick="window.location.reload()">🔄 Recarregar página</button>
            </div>
        `;
        showToast('Erro ao carregar dados: ' + error.message, 'error');
    }
}

function aplicarFiltros() {
    const filtros = {
        dataInicio: document.getElementById('dataInicio').value,
        dataFim: document.getElementById('dataFim').value,
        identificacao: document.getElementById('filtroIdentificacao').value,
        participacao: document.getElementById('filtroParticipacao').value,
        nome: document.getElementById('filtroNome').value
    };
    
    const { respostas, formData } = dadosGlobais;
    if (!respostas || !formData) return;
    
    const dadosFiltrados = processarDados(respostas, formData, filtros);
    
    if (dadosFiltrados.length === 0) {
        document.getElementById('dashboard-content').innerHTML = '<div class="loading"><p>📭 Nenhuma resposta encontrada com os filtros selecionados.</p></div>';
        return;
    }
    
    // Calcular KPIs
    const kpis = calcularKPIs(dadosFiltrados, formData);
    
    // Processar áreas de interesse (se existir a pergunta)
    const perguntaAreas = formData.form.questions.find(q => q.title === 'Em quais áreas você gostaria de aprender mais durante a SIPAT?');
    const areasInteresse = perguntaAreas ? contarCheckbox(dadosFiltrados, perguntaAreas, formData) : [];
    
    // Processar atividades preferidas (se existir a pergunta)
    const perguntaAtividades = formData.form.questions.find(q => q.title === 'Que tipo de atividade você gostaria de encontrar durante a SIPAT?');
    const atividadesPreferidas = perguntaAtividades ? contarCheckbox(dadosFiltrados, perguntaAtividades, formData) : [];
    
    // Processar temas pessoais (se existir a pergunta)
    const perguntaTemas = formData.form.questions.find(q => q.title === 'Pensando na sua vida pessoal, qual destes temas seria mais útil para você?');
    const temasPessoais = perguntaTemas ? contarCheckbox(dadosFiltrados, perguntaTemas, formData) : [];
    
    // Processar médias das escalas
    const mediasEscalas = {};
    const perguntasEscala = formData.form.questions.filter(q => q.type === 'scale');
    for (const pergunta of perguntasEscala) {
        let soma = 0;
        let count = 0;
        for (const resposta of dadosFiltrados) {
            const valor = resposta.data[pergunta.id];
            if (valor && !isNaN(parseFloat(valor))) {
                soma += parseFloat(valor);
                count++;
            }
        }
        mediasEscalas[pergunta.title] = count > 0 ? (soma / count) : 0;
    }
    
    // Processar nuvem de palavras
    const perguntasTexto = formData.form.questions.filter(q => q.type === 'text' || q.type === 'textarea');
    
    // Atualizar a lista de nomes no datalist
    const listaNomes = document.getElementById('listaNomes');
    if (listaNomes) {
        const perguntaNome = formData.form.questions.find(q => q.title === 'Qual seu nome completo?');
        if (perguntaNome) {
            const nomes = new Set();
            for (const resposta of dadosFiltrados) {
                const nome = resposta.data[perguntaNome.id];
                if (nome && nome.trim() !== '') {
                    nomes.add(nome);
                }
            }
            const nomesOrdenados = Array.from(nomes).sort();
            listaNomes.innerHTML = '<option value="">-- Selecione um nome --</option>' +
                nomesOrdenados.map(nome => `<option value="${escapeHtml(nome)}">${escapeHtml(nome)}</option>`).join('');
            console.log(`📋 Lista de nomes atualizada: ${nomesOrdenados.length} nomes`);
        }
    }
    
    const wordCloud = gerarWordCloud(dadosFiltrados, perguntasTexto, formData);
    
    // Renderizar dashboard
    const dashboardHTML = renderizarDashboard(
        dadosFiltrados, formData, kpis, areasInteresse, 
        atividadesPreferidas, temasPessoais, mediasEscalas, wordCloud
    );
    
    document.getElementById('dashboard-content').innerHTML = dashboardHTML;
    showToast(`✅ ${dadosFiltrados.length} respostas carregadas com sucesso!`, 'success');
}

function limparFiltros() {
    document.getElementById('dataInicio').value = '';
    document.getElementById('dataFim').value = '';
    document.getElementById('filtroIdentificacao').value = 'todos';
    document.getElementById('filtroParticipacao').value = 'todos';
    aplicarFiltros();
}

function exportarCSV() {
    const { respostas, formData } = dadosGlobais;
    if (!respostas || respostas.length === 0) {
        showToast('Nenhum dado para exportar', 'error');
        return;
    }
    
    const filtros = {
        dataInicio: document.getElementById('dataInicio').value,
        dataFim: document.getElementById('dataFim').value,
        identificacao: document.getElementById('filtroIdentificacao').value,
        participacao: document.getElementById('filtroParticipacao').value
    };
    
    const dadosFiltrados = processarDados(respostas, formData, filtros);
    
    if (dadosFiltrados.length === 0) {
        showToast('Nenhum dado para exportar com os filtros atuais', 'error');
        return;
    }
    
    const headers = ['Data/Hora', ...formData.form.questions.map(q => q.title)];
    const rows = dadosFiltrados.map(r => [
        new Date(r.timestamp).toLocaleString(),
        ...formData.form.questions.map(q => {
            let val = r.data[q.id] || '';
            if (Array.isArray(val)) return val.join('; ');
            return val;
        })
    ]);
    
    const csv = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `dashboard_sipat_${new Date().toISOString().slice(0, 19)}.csv`;
    link.click();
    URL.revokeObjectURL(link.href);
    
    showToast(`📥 ${dadosFiltrados.length} respostas exportadas!`, 'success');
}

function mostrarDebug() {
    console.log('=== DADOS GLOBAIS ===');
    console.log('Respostas:', dadosGlobais.respostas);
    console.log('FormData:', dadosGlobais.formData);

}

function filtrarUltimosDias(dias) {
    const dataFim = new Date();
    const dataInicio = new Date();
    dataInicio.setDate(dataInicio.getDate() - dias);
    
    document.getElementById('dataInicio').value = dataInicio.toISOString().split('T')[0];
    document.getElementById('dataFim').value = dataFim.toISOString().split('T')[0];
    
    aplicarFiltros();
    showToast(`📅 Mostrando últimos ${dias} dias`, 'success');
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

window.addEventListener('load', function() {
    carregarListaFormularios();
});
